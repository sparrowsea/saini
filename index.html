<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALARIA - JKSSB Computer Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; margin: 0; padding-bottom: 30px; display: flex; flex-direction: column; align-items: center; }
        .main-header { width: 100%; background: #1a252f; color: #ffffff; text-align: center; padding: 20px 0; font-size: 2.5rem; font-weight: bold; letter-spacing: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 25px; }
        .main-wrapper { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1100px; width: 95%; }
        .quiz-container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); flex: 2; min-width: 320px; border-top: 5px solid #007bff; }
        .sidebar { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); flex: 1; min-width: 280px; align-self: flex-start; }
        .header-top { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .timer { font-size: 1.4rem; font-weight: bold; color: #d9534f; background: #fff5f5; padding: 8px 15px; border-radius: 8px; border: 2px solid #feb2b2; }
        h2 { font-size: 1.2rem; color: #2d3748; line-height: 1.6; margin-bottom: 25px; white-space: pre-line; }
        .option-label { display: block; background: #f7fafc; padding: 14px 18px; margin-bottom: 12px; border-radius: 8px; cursor: pointer; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .option-label:hover { background: #edf2f7; border-color: #cbd5e0; }
        .option-label.selected { background: #ebf8ff; border-color: #4299e1; font-weight: bold; }
        input[type="radio"] { display: none; }
        .btn-group { display: flex; justify-content: space-between; margin-top: 25px; gap: 15px; }
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        .btn-nav { background: #4a5568; color: white; }
        .btn-nav:hover { background: #2d3748; }
        .btn-submit { background: #38a169; color: white; width: 100%; margin-top: 15px; }
        .btn-submit:hover { background: #2f855a; }
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .palette-btn { padding: 12px 0; text-align: center; border-radius: 6px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .palette-btn.answered { background: #48bb78; color: white; border-color: #38a169; }
        .palette-btn.active { border: 3px solid #4299e1; }
        .result-screen { display: none; width: 95%; max-width: 850px; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .score-box { background: #ebf8ff; padding: 30px; border-radius: 12px; text-align: center; margin-bottom: 30px; border: 1px solid #bee3f8; }
        .review-item { border-bottom: 1px solid #edf2f7; padding: 25px 0; }
        .explanation { background: #fffaf0; border-left: 5px solid #ed8936; padding: 15px; margin-top: 15px; font-size: 0.95rem; border-radius: 4px; }
    </style>
</head>
<body>

<div class="main-header">SALARIA</div>

<div class="main-wrapper" id="test-wrapper">
    <div class="quiz-container">
        <div class="header-top">
            <h1 style="font-size: 1.3rem;">JKSSB Computer Advanced Mock</h1>
            <div class="timer" id="timer-display">60:00</div>
        </div>
        <p><strong>Question <span id="current-q">1</span> of <span id="total-qs-count"></span></strong></p>
        <h2 id="question-text">Loading...</h2>
        <div class="options" id="options-container"></div>
        <div class="btn-group">
            <button class="btn-nav" id="prev-btn" onclick="prevQuestion()">Previous</button>
            <button class="btn-nav" id="next-btn" onclick="nextQuestion()">Next</button>
        </div>
        <button class="btn-submit" onclick="submitTest(false)">Submit Final Test</button>
    </div>

    <div class="sidebar">
        <h3 style="text-align:center; margin-top:0;">Navigation</h3>
        <div class="palette-grid" id="palette-grid"></div>
        <div style="margin-top:20px; font-size:0.85rem; color:#718096; text-align:center;">Green = Answered | White = Unattempted</div>
    </div>
</div>

<div class="result-screen" id="result-screen">
    <h1 style="text-align: center; color: #2d3748;">Performance Analysis</h1>
    <div class="score-box">
        <div style="font-size: 2.5rem; font-weight: bold; color: #2b6cb0;">Total: <span id="final-score"></span></div>
    </div>
    <div id="review-container"></div>
</div>

<script>
    const quizData = [
        // EASTER EGG
        { question: "Who is the bosss?", options: ["A) Rajput hunde surme", "B) Gagan", "C) Akash", "D) Avneet", "E) Sumit"], answer: 0, explanation: "Rajput hunde surme! The undisputed boss." },

        // --- SECTION 1: INVENTORS & FATHERS ---
        { question: "Consider the following statements:\n1. Charles Babbage is known as the Father of the Computer.\n2. Lady Ada Lovelace is regarded as the first computer programmer.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 2, explanation: "Both statements are historically correct." },
        { question: "Consider the following statements regarding the invention of the Web:\n1. Tim Berners-Lee invented the World Wide Web in 1989.\n2. Vint Cerf is widely known as the 'Father of the Internet'.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 2, explanation: "Both statements are correct. Vint Cerf co-developed TCP/IP, earning him the title 'Father of the Internet'." },
        { question: "Consider the following statements:\n1. Douglas Engelbart is credited with the invention of the computer mouse.\n2. Christopher Sholes invented the QWERTY keyboard layout.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 2, explanation: "Both statements are factual and correctly identify the inventors." },
        { question: "Consider the following statements regarding early email systems:\n1. Ray Tomlinson is considered the creator of the first electronic email system.\n2. The '@' symbol was introduced by Larry Page to separate the user from the machine name.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 0, explanation: "Statement 2 is wrong. Ray Tomlinson introduced the '@' symbol, not Larry Page." },
        { question: "Consider the following statements about Artificial Intelligence:\n1. Alan Turing coined the term 'Artificial Intelligence' in 1955.\n2. John McCarthy is widely recognized as the Father of Artificial Intelligence.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 1, explanation: "Statement 1 is incorrect. John McCarthy coined the term, not Alan Turing." },
        { question: "Consider the following pairs of inventors and their creations:\n1. Dennis Ritchie - C programming language\n2. Bjarne Stroustrup - Python programming language\nWhich of the above pairs is/are correctly matched?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 0, explanation: "Statement 2 is incorrect. Bjarne Stroustrup created C++, while Python was created by Guido van Rossum." },
        { question: "Consider the following statements:\n1. The Integrated Circuit (IC) was independently invented by Jack Kilby and Robert Noyce.\n2. The first commercial microprocessor (Intel 4004) was developed by Gordon Moore.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 0, explanation: "Statement 2 is incorrect. The Intel 4004 was primarily developed by Marcian 'Ted' Hoff and Federico Faggin." },
        { question: "Consider the following statements regarding computer architecture:\n1. The 'Stored-Program Concept' was introduced by John von Neumann.\n2. Von Neumann architecture uses separate memory units for data and instructions.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 0, explanation: "Statement 2 is incorrect. Von Neumann architecture uses a SINGLE shared memory for both data and instructions. Harvard architecture uses separate memories." },
        { question: "Consider the following statements:\n1. Linus Torvalds created the Linux operating system kernel.\n2. Herman Hollerith invented the punch card tabulating machine.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 2, explanation: "Both statements are correct. Hollerith's company later became IBM." },
        { question: "Consider the following statements about programming language pioneers:\n1. James Gosling created the Java programming language.\n2. Grace Hopper invented the first compiler.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 2, explanation: "Both statements are correct." },

        // --- SECTION 2: FULL FORMS & ABBREVIATIONS ---
        { question: "Consider the following statements regarding memory abbreviations:\n1. RAM stands for Read Access Memory.\n2. ROM stands for Random Only Memory.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 3, explanation: "Both are incorrect. RAM = Random Access Memory. ROM = Read Only Memory." },
        { question: "Consider the following statements:\n1. GUI stands for Graphical User Interface.\n2. BIOS stands for Basic Input Output System.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 2, explanation: "Both full forms are completely correct." },
        { question: "Consider the following statements regarding network terms:\n1. URL stands for Uniform Resource Locator.\n2. HTTP stands for HyperText Transmission Process.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 0, explanation: "Statement 2 is incorrect. HTTP stands for HyperText Transfer Protocol." },
        { question: "Consider the following statements:\n1. PDF stands for Portable Document Format.\n2. SMTP stands for Simple Mail Transfer Protocol.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 2, explanation: "Both full forms are correct. PDF is by Adobe, and SMTP is used for sending emails." },
        { question: "Consider the following statements about networking hardware:\n1. LAN stands for Local Area Network.\n2. WAN stands for Wireless Area Network.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 0, explanation: "Statement 2 is incorrect. WAN stands for Wide (not Wireless) Area Network." },
        { question: "Consider the following statements regarding computer addresses:\n1. IP stands for Internet Protocol.\n2. MAC stands for Machine Access Control.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 0, explanation: "Statement 2 is incorrect. MAC stands for Media (not Machine) Access Control." },
        { question: "Consider the following statements about computer storage:\n1. SSD stands for Solid State Drive.\n2. HDD stands for High Density Disk.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 0, explanation: "Statement 2 is incorrect. HDD stands for Hard Disk Drive." },
        { question: "Consider the following statements:\n1. VPN stands for Virtual Private Network.\n2. DNS stands for Domain Name System.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 2, explanation: "Both statements are correct network terminology." },
        { question: "Consider the following statements regarding hardware:\n1. SMPS stands for Switched-Mode Power Supply.\n2. USB stands for Universal Serial Bus.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 2, explanation: "Both full forms are completely correct." },
        { question: "Consider the following statements about input devices:\n1. OMR stands for Optical Mark Recognition.\n2. MICR stands for Magnetic Ink Character Recognition.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 2, explanation: "Both are correct. OMR is used for checking MCQ sheets, and MICR is used in banking for cheques." },

        // --- SECTION 3: SHORTCUT KEYS ---
        { question: "Consider the following statements regarding MS Office shortcuts:\n1. Ctrl + Z is used to Undo the last action.\n2. Ctrl + Y is used to Redo the last action.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 2, explanation: "Both statements are correct universal shortcuts in Windows." },
        { question: "Consider the following statements:\n1. Ctrl + X is used to Copy selected text.\n2. Ctrl + V is used to Paste copied text.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 1, explanation: "Statement 1 is incorrect. Ctrl + X is used to CUT, while Ctrl + C is used to COPY." },
        { question: "Consider the following statements regarding MS Word alignment shortcuts:\n1. Ctrl + E is used to Center Align text.\n2. Ctrl + J is used to Justify text.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 2, explanation: "Both statements are correct paragraph alignment shortcuts in MS Word." },
        { question: "Consider the following statements about MS Excel:\n1. The F2 key is used to edit the active cell.\n2. Ctrl + ; (semicolon) is used to insert the current date.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 2, explanation: "Both statements correctly describe MS Excel functionality." },
        { question: "Consider the following statements regarding MS PowerPoint shortcuts:\n1. Ctrl + N inserts a New Slide in the current presentation.\n2. Ctrl + M opens a completely new presentation file.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 3, explanation: "Both are incorrect because they are swapped. Ctrl + M inserts a New Slide, and Ctrl + N opens a New Presentation file." },
        { question: "Consider the following statements:\n1. The F7 key is used to check Spelling and Grammar in MS Office.\n2. Ctrl + P opens the print dialog box.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 2, explanation: "Both statements correctly describe standard MS Office shortcuts." },
        { question: "Consider the following statements regarding Windows OS shortcuts:\n1. Alt + Tab allows you to switch between open applications.\n2. Alt + F4 minimizes the currently active window.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 0, explanation: "Statement 2 is incorrect. Alt + F4 CLOSES the currently active window/application, it does not minimize it." },
        { question: "Consider the following statements:\n1. Shift + Delete permanently deletes a file without sending it to the Recycle Bin.\n2. Windows Key + L immediately locks the PC screen.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 2, explanation: "Both statements are correct Windows OS shortcut commands." },
        { question: "Consider the following statements regarding browser shortcuts:\n1. Ctrl + T opens a new browser tab.\n2. Ctrl + H opens the browser history.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 2, explanation: "Both shortcuts are universally standard across modern web browsers like Chrome and Edge." },
        { question: "Consider the following statements regarding text navigation shortcuts:\n1. Ctrl + Home moves the cursor to the beginning of the document.\n2. Ctrl + End moves the cursor to the end of the line.\nWhich of the statements given above is/are correct?", options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], answer: 0, explanation: "Statement 2 is incorrect. Ctrl + End moves the cursor to the END OF THE DOCUMENT. To move to the end of a line, you just press 'End'." }
    ];

    let currentQ = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let timeLeft = 60 * 60;
    let timerInterval;

    document.getElementById('total-qs-count').innerText = quizData.length;

    function initTest() {
        const grid = document.getElementById('palette-grid');
        grid.innerHTML = '';
        for (let i = 0; i < quizData.length; i++) {
            const btn = document.createElement('div');
            btn.className = 'palette-btn';
            btn.innerText = i + 1;
            btn.id = 'pal-' + i;
            btn.onclick = () => loadQuestion(i);
            grid.appendChild(btn);
        }
        loadQuestion(0);
        startTimer();
    }

    function loadQuestion(index) {
        currentQ = index;
        document.getElementById('current-q').innerText = currentQ + 1;
        document.getElementById('question-text').innerText = quizData[currentQ].question;
        document.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('pal-' + currentQ).classList.add('active');
        const optsContainer = document.getElementById('options-container');
        optsContainer.innerHTML = '';
        quizData[currentQ].options.forEach((opt, i) => {
            const label = document.createElement('label');
            label.className = 'option-label' + (userAnswers[currentQ] === i ? ' selected' : '');
            label.innerHTML = `<input type="radio" name="opt" onclick="selectOption(${i})"> ${opt}`;
            optsContainer.appendChild(label);
        });
        document.getElementById('prev-btn').disabled = (currentQ === 0);
        document.getElementById('next-btn').disabled = (currentQ === quizData.length - 1);
    }

    function selectOption(index) {
        userAnswers[currentQ] = index;
        document.getElementById('pal-' + currentQ).classList.add('answered');
        loadQuestion(currentQ);
    }

    function nextQuestion() { if(currentQ < quizData.length - 1) loadQuestion(currentQ + 1); }
    function prevQuestion() { if(currentQ > 0) loadQuestion(currentQ - 1); }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if (timeLeft <= 0) { clearInterval(timerInterval); submitTest(true); }
        }, 1000);
    }

    function submitTest(auto = false) {
        if(!auto && !confirm("Submit SALARIA Mock Test for Evaluation?")) return;
        clearInterval(timerInterval);
        document.getElementById('test-wrapper').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        let correct = 0;
        const container = document.getElementById('review-container');
        container.innerHTML = '';
        userAnswers.forEach((ans, i) => {
            const isCorrect = (ans === quizData[i].answer);
            if(isCorrect) correct++;
            const item = document.createElement('div');
            item.className = 'review-item';
            item.innerHTML = `
                <p><strong>Q${i+1}. ${quizData[i].question}</strong></p>
                <p style="color:${isCorrect ? '#38a169' : '#e53e3e'}; font-weight:bold;">Your Answer: ${ans !== null ? quizData[i].options[ans] : 'Not Attempted'}</p>
                <p style="color:#38a169; font-weight:bold;">Correct Answer: ${quizData[i].options[quizData[i].answer]}</p>
                <div class="explanation"><strong>Explanation:</strong> ${quizData[i].explanation}</div>
            `;
            container.appendChild(item);
        });
        document.getElementById('final-score').innerText = `${correct} / ${quizData.length}`;
        window.scrollTo(0,0);
    }

    window.onload = initTest;
</script>

</body>
</html>
