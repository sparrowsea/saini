<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALARIA - JKSSB Advanced Computer Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; margin: 0; padding: 0 0 20px 0; display: flex; flex-direction: column; align-items: center; }
        .main-header { width: 100%; background: #1a252f; color: #ffffff; text-align: center; padding: 15px 0; font-size: 2.2rem; font-weight: bold; letter-spacing: 4px; margin-bottom: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        .main-wrapper { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1000px; width: 95%; }
        .quiz-container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); flex: 2; min-width: 300px; }
        .sidebar { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); flex: 1; min-width: 250px; align-self: flex-start; }
        .header-top { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .timer { font-size: 1.3rem; font-weight: bold; color: #d9534f; background: #fdf0ef; padding: 6px 12px; border-radius: 5px; border: 1px solid #f5c6cb;}
        h2 { font-size: 1.1rem; color: #34495e; min-height: 80px; line-height: 1.4;}
        .option-label { display: block; background: #e9ecef; padding: 12px 15px; margin-bottom: 10px; border-radius: 6px; cursor: pointer; border: 1px solid #ced4da; transition: 0.2s; }
        .option-label:hover { background: #dce1e6; }
        .option-label.selected { background: #cce5ff; border-color: #b8daff; font-weight: bold;}
        input[type="radio"] { display: none; }
        .btn-group { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px;}
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; flex: 1; font-size: 1rem; }
        .btn-nav { background: #6c757d; color: white; }
        .btn-submit { background: #28a745; color: white; }
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px;}
        .palette-btn { padding: 10px 0; text-align: center; border-radius: 5px; border: 1px solid #ccc; background: #f8f9fa; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .palette-btn.answered { background: #28a745; color: white; }
        .palette-btn.active { box-shadow: 0 0 0 3px #007bff; }
        .result-screen { display: none; width: 95%; max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px;}
        .score-box { background: #e8f4f8; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 20px;}
        .review-item { border-bottom: 1px solid #ddd; padding: 20px 0; }
        .explanation { background: #f9f9f9; border-left: 4px solid #007bff; padding: 12px; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="main-header">SALARIA</div>

<div class="main-wrapper" id="test-wrapper">
    <div class="quiz-container">
        <div class="header-top">
            <h1 style="font-size: 1.2rem;">JKSSB Statement-Based Mock</h1>
            <div class="timer" id="timer-display">60:00</div>
        </div>
        <p><strong>Question <span id="current-q">1</span> of 100</strong></p>
        <h2 id="question-text">Loading...</h2>
        <div class="options" id="options-container"></div>
        <div class="btn-group">
            <button class="btn-nav" id="prev-btn" onclick="prevQuestion()">Previous</button>
            <button class="btn-nav" id="next-btn" onclick="nextQuestion()">Next</button>
        </div>
        <div class="btn-group">
            <button class="btn-submit" onclick="submitTest(false)">Submit Final Test</button>
        </div>
    </div>

    <div class="sidebar">
        <h3 style="text-align:center; font-size:1rem;">Question Palette</h3>
        <div class="palette-grid" id="palette-grid"></div>
    </div>
</div>

<div class="result-screen" id="result-screen">
    <h1 style="text-align: center;">Result Analysis</h1>
    <div class="score-box">
        <div style="font-size: 2rem; font-weight: bold; color: #0056b3;">Score: <span id="final-score"></span></div>
    </div>
    <div id="review-container"></div>
</div>

<script>
    const quizData = [
        { question: "Who is the bosss?", options: ["A) Rajput hunde surme", "B) Gagan", "C) Akash", "D) Avneet", "E) Sumit"], answer: 0, explanation: "Rajput hunde surme! The undisputed boss." },
        
        // STATEMENT BASED QUESTIONS BEGIN
        { 
            question: "Consider the following statements regarding early computing devices:\n1. Charles Babbage designed the 'Difference Engine' to calculate logarithmic tables.\n2. Lady Ada Lovelace is regarded as the first programmer for her work on the Analytical Engine.\nWhich of the above is/are correct?", 
            options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], 
            answer: 2, 
            explanation: "Both statements are correct. Babbage designed the Difference Engine, and Ada Lovelace wrote the first algorithm for his machines." 
        },
        { 
            question: "Consider the following statements about computer generations:\n1. Vacuum tubes were the primary component of Second Generation computers.\n2. Integrated Circuits (ICs) led to the development of Third Generation computers.\nWhich statement(s) is/are correct?", 
            options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], 
            answer: 1, 
            explanation: "Statement 1 is wrong (1st Gen used Vacuum tubes; 2nd Gen used Transistors). Statement 2 is correct." 
        },
        { 
            question: "With reference to Computer Memory, consider the following:\n1. Cache memory is faster than Main Memory (RAM).\n2. RAM is non-volatile in nature.\nWhich of the above is/are correct?", 
            options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], 
            answer: 0, 
            explanation: "Cache is faster than RAM, but RAM is volatile (loses data when power is off)." 
        },
        { 
            question: "Consider the following pairs of Full Forms:\n1. HTTP: HyperText Transfer Protocol\n2. URL: Universal Resource Locator\nWhich of the above is/are correctly matched?", 
            options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], 
            answer: 0, 
            explanation: "Statement 2 is wrong because URL stands for Uniform (not Universal) Resource Locator." 
        },
        { 
            question: "Consider the following statements regarding MS-Word shortcuts:\n1. Ctrl + K is used to insert a Hyperlink.\n2. Ctrl + L is used to Center Align the text.\nWhich of the above is/are correct?", 
            options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"], 
            answer: 0, 
            explanation: "Ctrl + L is for Left Align. Ctrl + E is for Center Align." 
        }
        // ... (I have added logic to loop these for the demo, but for 100 Qs you'd fill the array here)
    ];

    // GENERATING DUMMY JKSSB DATA TO REACH 100 FOR YOUR PORTAL
    for(let i=7; i<=100; i++) {
        if(i <= 35) {
            quizData.push({
                question: `Statement Question ${i}: Regarding Computer Hardware...\n1. ROM is a volatile memory.\n2. SSDs are faster than HDDs.\nWhich is correct?`,
                options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"],
                answer: 1,
                explanation: "SSDs use flash memory and are significantly faster than mechanical HDDs."
            });
        } else if (i <= 70) {
            quizData.push({
                question: `Abbreviation Test ${i}: Consider the following:\n1. GUI stands for Graphical User Interface.\n2. BIOS stands for Binary Input Output System.\nWhich is correct?`,
                options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"],
                answer: 0,
                explanation: "BIOS stands for Basic (not Binary) Input Output System."
            });
        } else {
            quizData.push({
                question: `Shortcut Challenge ${i}: Consider these Windows keys:\n1. Alt + F4 closes the active window.\n2. Ctrl + Esc opens the Start Menu.\nWhich is correct?`,
                options: ["A) 1 only", "B) 2 only", "C) Both 1 and 2", "D) Neither 1 nor 2"],
                answer: 2,
                explanation: "Both are standard Windows shortcuts."
            });
        }
    }

    let currentQ = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let timeLeft = 60 * 60;
    let timerInterval;

    function initTest() {
        const grid = document.getElementById('palette-grid');
        for (let i = 0; i < quizData.length; i++) {
            const btn = document.createElement('div');
            btn.className = 'palette-btn';
            btn.innerText = i + 1;
            btn.id = 'pal-' + i;
            btn.onclick = () => loadQuestion(i);
            grid.appendChild(btn);
        }
        loadQuestion(0);
        startTimer();
    }

    function loadQuestion(index) {
        currentQ = index;
        document.getElementById('current-q').innerText = currentQ + 1;
        document.getElementById('question-text').innerText = quizData[currentQ].question;
        document.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('pal-' + currentQ).classList.add('active');
        const optsContainer = document.getElementById('options-container');
        optsContainer.innerHTML = '';
        quizData[currentQ].options.forEach((opt, i) => {
            const label = document.createElement('label');
            label.className = 'option-label' + (userAnswers[currentQ] === i ? ' selected' : '');
            label.innerHTML = `<input type="radio" name="opt" onclick="selectOption(${i})"> ${opt}`;
            optsContainer.appendChild(label);
        });
    }

    function selectOption(index) {
        userAnswers[currentQ] = index;
        document.getElementById('pal-' + currentQ).classList.add('answered');
        loadQuestion(currentQ);
    }

    function nextQuestion() { if(currentQ < quizData.length-1) loadQuestion(currentQ+1); }
    function prevQuestion() { if(currentQ > 0) loadQuestion(currentQ-1); }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if (timeLeft <= 0) submitTest(true);
        }, 1000);
    }

    function submitTest(auto = false) {
        if(!auto && !confirm("Submit SALARIA Mock Test?")) return;
        clearInterval(timerInterval);
        document.getElementById('test-wrapper').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        let correct = 0;
        const container = document.getElementById('review-container');
        userAnswers.forEach((ans, i) => {
            const isCorrect = (ans === quizData[i].answer);
            if(isCorrect) correct++;
            const item = document.createElement('div');
            item.className = 'review-item';
            item.innerHTML = `
                <p><strong>Q${i+1}. ${quizData[i].question}</strong></p>
                <p style="color:${isCorrect ? '#28a745' : '#dc3545'}">Your Answer: ${ans !== null ? quizData[i].options[ans] : 'Skipped'}</p>
                <p style="color:#28a745">Correct: ${quizData[i].options[quizData[i].answer]}</p>
                <div class="explanation"><em>Note:</em> ${quizData[i].explanation}</div>
            `;
            container.appendChild(item);
        });
        document.getElementById('final-score').innerText = `${correct} / 100`;
        window.scrollTo(0,0);
    }

    window.onload = initTest;
</script>
</body>
</html>
