<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALARIA V3 - Master Revision</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; margin: 0; padding-bottom: 50px; display: flex; flex-direction: column; align-items: center; }
        
        /* Deep Blue Header for V3 */
        .main-header { 
            width: 100%; background: #0a192f; color: #ffffff; text-align: center; padding: 30px 0; 
            font-size: 2.5rem; font-weight: bold; letter-spacing: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            animation: salariaGlow 4s infinite alternate;
        }
        @keyframes salariaGlow {
            from { text-shadow: 0 0 5px #fff; }
            to { text-shadow: 0 0 20px #007bff; }
        }

        .version-tag { background: #e53e3e; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; margin-top: 10px; display: inline-block; }

        .main-wrapper { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1100px; width: 95%; justify-content: center; margin-top: 20px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; width: 100%; }
        .test-card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; cursor: pointer; border-top: 4px solid #38a169; }
        
        #test-wrapper { display: none; width: 95%; max-width: 1100px; gap: 20px; margin-top: 20px; }
        .quiz-container { background: #fff; padding: 25px; border-radius: 12px; flex: 2; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .sidebar { background: #fff; padding: 15px; border-radius: 12px; flex: 1; max-width: 300px; }
        
        .option-label { display: block; background: #f7fafc; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #e2e8f0; cursor: pointer; }
        .option-label.correct { background: #d4edda; color: #155724; font-weight: bold; }
        .option-label.wrong { background: #f8d7da; color: #721c24; text-decoration: line-through; }
        
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .palette-btn { padding: 10px 0; text-align: center; background: #edf2f7; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .palette-btn.correct { background: #48bb78; color: white; }
        .palette-btn.wrong { background: #e53e3e; color: white; }

        .cache-button { background: #e53e3e; color: white; border: none; padding: 15px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="main-header">
    SALARIA
    <br><span class="version-tag">SYSTEM V3.0 - DYNAMIC ENGINE</span>
</div>

<button class="cache-button" onclick="location.reload(true)">FORCE REFRESH (CLEAR CACHE)</button>

<div id="main-dashboard" class="main-wrapper">
    <h2 style="width:100%; border-bottom: 2px solid #38a169;">JKPSC Polity Chapters</h2>
    <div class="card-grid" id="polity-grid"></div>
</div>

<div id="test-wrapper">
    <div class="quiz-container">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 id="quiz-title">Practice Mode</h3>
            <div id="timer" style="font-family:monospace; font-size:1.5rem; color:#e53e3e;">00:00</div>
        </div>
        <hr>
        <p>Question <span id="q-num">1</span></p>
        <h2 id="q-text" style="font-size: 1.2rem;"></h2>
        <div id="options"></div>
        <div id="explanation" style="display:none; background:#fffaf0; padding:15px; border-left:4px solid #ed8936; margin-top:15px;"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="prevQ()" style="flex:1; padding:10px;">Previous</button>
            <button onclick="nextQ()" style="flex:1; padding:10px;">Next</button>
        </div>
        <button onclick="location.reload()" style="width:100%; margin-top:10px; padding:10px;">Exit to Dashboard</button>
    </div>
    <div class="sidebar">
        <h3>Question Tracker</h3>
        <div class="palette-grid" id="palette"></div>
    </div>
</div>

<script>
    let questions = [], currentIdx = 0, answers = [], end;

    // Build the 71 buttons
    const grid = document.getElementById('polity-grid');
    for(let i=1; i<=71; i++) {
        const card = document.createElement('div');
        card.className = 'test-card';
        card.innerHTML = '<h3>Chapter ' + i + '</h3><button style="pointer-events:none">Start</button>';
        // Correctly passing the path to the function
        card.onclick = () => loadTest('jkpsc/polity/ch' + i);
        grid.appendChild(card);
    }

    async function loadTest(path) {
        const file = 'data/' + path + '.json';
        console.log("Fetching:", file);
        
        try {
            const res = await fetch(file);
            if(!res.ok) throw new Error();
            questions = await res.json();
            answers = new Array(questions.length).fill(null);
            currentIdx = 0;
            
            document.getElementById('main-dashboard').style.display = 'none';
            document.getElementById('test-wrapper').style.display = 'flex';
            
            let palHtml = '';
            questions.forEach((_, i) => palHtml += '<div class="palette-btn" id="pal-'+i+'" onclick="showQ('+i+')">'+(i+1)+'</div>');
            document.getElementById('palette').innerHTML = palHtml;
            
            end = Date.now() + (questions.length * 60000);
            setInterval(updateTimer, 1000);
            showQ(0);
        } catch(e) {
            alert("⚠️ SYSTEM ERROR\n\nI tried to open: " + file + "\n\nIf this is wrong, tell me. If it's right, make sure ch7.json exists in that folder.");
        }
    }

    function showQ(idx) {
        currentIdx = idx;
        const q = questions[idx];
        document.getElementById('q-num').innerText = (idx + 1);
        document.getElementById('q-text').innerText = q.question;
        
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        const answered = answers[idx] !== null;
        
        q.options.forEach((opt, i) => {
            const btn = document.createElement('div');
            btn.className = 'option-label' + (answered ? (i === q.answer ? ' correct' : (i === answers[idx] ? ' wrong' : '')) : '');
            btn.innerText = opt;
            if(!answered) btn.onclick = () => select(i);
            optDiv.appendChild(btn);
        });
        
        document.getElementById('explanation').style.display = answered ? 'block' : 'none';
        if(answered) document.getElementById('explanation').innerHTML = "<b>Explanation:</b> " + q.explanation;
        
        document.querySelectorAll('.palette-btn').forEach(b => b.style.border = 'none');
        document.getElementById('pal-'+idx).style.border = '3px solid black';
    }

    function select(i) {
        if(answers[currentIdx] !== null) return;
        answers[currentIdx] = i;
        document.getElementById('pal-'+currentIdx).className = 'palette-btn ' + (i === questions[currentIdx].answer ? 'correct' : 'wrong');
        showQ(currentIdx);
    }

    function nextQ() { if(currentIdx < questions.length -1) showQ(currentIdx+1); }
    function prevQ() { if(currentIdx > 0) showQ(currentIdx-1); }

    function updateTimer() {
        const remain = end - Date.now();
        if(remain <= 0) return document.getElementById('timer').innerText = "00:00";
        const m = Math.floor(remain/60000), s = Math.floor((remain%60000)/1000);
        document.getElementById('timer').innerText = m + ":" + (s < 10 ? '0' : '') + s;
    }
</script>
</body>
</html>
